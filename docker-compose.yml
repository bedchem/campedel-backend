version: '3.8'

services:
  campedel-backend:
    build: .
    container_name: campedel-backend
    restart: unless-stopped
    ports:
      - "3002:3002"
    env_file:
      - .env
    environment:
      PORT: "3002"
      UPLOAD_DIR: /app/data/uploads
      # HOME → cloudflared cert.pem + config persisted on the volume
      HOME: /app/data
    volumes:
      - campedel-data:/app/data
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3002/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

volumes:
  campedel-data:
