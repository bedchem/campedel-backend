services:
  campedel-backend:
    build: .
    container_name: campedel-backend
    restart: unless-stopped
    ports:
      - "3002:3002"
    env_file:
      - .env
    environment:
      PORT: "3002"
      UPLOAD_DIR: /app/data/uploads
      HOME: /app/data
      CF_SERVICE_HOST: campedel-backend
    volumes:
      - campedel-data:/app/data
      # Docker socket → backend can restart the cloudflared container after tunnel config
      - /var/run/docker.sock:/var/run/docker.sock
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3002/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  cloudflared:
    build:
      context: .
      dockerfile: Dockerfile.cloudflared
    container_name: campedel-cloudflared
    restart: always          # always restart — permanent tunnel
    entrypoint: /bin/sh
    command:
      - -c
      - |
        while true; do
          if [ -n "$TUNNEL_TOKEN" ]; then
            cloudflared tunnel --no-autoupdate run --token "$TUNNEL_TOKEN"
          elif [ -f /data/.cloudflared/cert.pem ]; then
            cloudflared tunnel --no-autoupdate run "${TUNNEL_NAME:-campedel}"
          else
            cloudflared tunnel --no-autoupdate --url http://campedel-backend:3002
          fi
          echo "cloudflared exited, restarting in 5s..."
          sleep 5
        done
    environment:
      HOME: /data
      TUNNEL_TOKEN: ${TUNNEL_TOKEN:-}
      TUNNEL_NAME: ${TUNNEL_NAME:-campedel}
      TUNNEL_LOGFILE: /data/cf.log
    volumes:
      - campedel-data:/data
    # No depends_on → starts immediately with docker compose up (fast!)

volumes:
  campedel-data:
