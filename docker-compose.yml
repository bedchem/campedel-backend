version: '3.8'

services:
  campedel-backend:
    build: .
    container_name: campedel-backend
    restart: unless-stopped
    ports:
      - "3002:3002"
    env_file:
      - .env
    environment:
      PORT: "3002"
      UPLOAD_DIR: /app/data/uploads
      HOME: /app/data
    volumes:
      - campedel-data:/app/data
      # Docker socket → backend can restart the cloudflared container after tunnel config
      - /var/run/docker.sock:/var/run/docker.sock
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3002/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: campedel-cloudflared
    restart: always          # always restart — permanent tunnel
    user: root               # needed to read files written by backend (root)
    entrypoint: /bin/sh
    command:
      - -c
      - |
        if [ -f /data/.cloudflared/config.yml ] && [ -f /data/.cloudflared/cert.pem ]; then
          exec cloudflared tunnel --no-autoupdate --config /data/.cloudflared/config.yml run
        else
          exec cloudflared tunnel --no-autoupdate --url http://campedel-backend:3002 --logfile /data/cf.log
        fi
    environment:
      HOME: /data
    volumes:
      - campedel-data:/data
    # No depends_on → starts immediately with docker compose up (fast!)

volumes:
  campedel-data:
